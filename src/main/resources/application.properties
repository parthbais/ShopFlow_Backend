spring.application.name=ShopFlow
server.port=8080

# H2 (dev)
spring.datasource.url=jdbc:h2:mem:shopflowdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# MySQL (production) — comment H2 above and uncomment below
# spring.datasource.url=jdbc:mysql://localhost:3306/shopflow_db?useSSL=false&serverTimezone=UTC
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=your_password_here

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT (Phase 4)
app.jwt.secret=ShopFlowSecretKeyChangeInProductionMinimum32Characters
app.jwt.expiration-ms=86400000

# Logging
logging.level.com.shopflow=DEBUG
logging.level.org.springframework.security=WARN