spring.application.name=ShopFlow
server.port=8080

# Database — uses custom env vars on Render, falls back to H2 locally
spring.datasource.url=${DB_JDBC_URL:jdbc:h2:mem:shopflowdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USERNAME:shopflow_login}
spring.datasource.password=${DB_PASSWORD:Pass1234}

# H2 Console (local dev only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=${JWT_SECRET:ShopFlowSecretKeyChangeInProductionMinimum32Characters}
app.jwt.expiration-ms=86400000

# Logging
logging.level.com.shopflow=INFO
logging.level.org.springframework.security=WARN