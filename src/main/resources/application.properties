spring.application.name=ShopFlow
server.port=8080

# Database — uses env vars on Render, falls back to H2 locally
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:shopflowdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# H2 Console (works locally; harmless on prod)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=${JWT_SECRET:ShopFlowSecretKeyChangeInProductionMinimum32Characters}
app.jwt.expiration-ms=86400000

# Logging
logging.level.com.shopflow=INFO
logging.level.org.springframework.security=WARN